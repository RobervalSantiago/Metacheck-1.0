
<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#4f46e5" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="MetaCheck">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/svg+xml" href="/logo.svg">
    <link rel="apple-touch-icon" href="https://ui-avatars.com/api/?name=M&background=4f46e5&color=fff&size=192&font-size=0.6&bold=true&format=png">
    
    <title>MetaCheck</title>
    
    <!-- Leaflet Maps CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              mono: ['Roboto Mono', 'monospace'],
            },
            colors: {
              slate: {
                50: '#f8fafc', 
                100: '#f1f5f9',
                200: '#e2e8f0',
                300: '#cbd5e1',
                400: '#94a3b8',
                500: '#64748b', 
                600: '#475569',
                700: '#334155',
                800: '#1e293b', 
                900: '#0f172a',
                950: '#020617',
              },
              brand: {
                50: '#eef2ff',
                100: '#e0e7ff',
                200: '#c7d2fe',
                300: '#a5b4fc',
                400: '#818cf8',
                500: '#6366f1',
                600: '#4f46e5', 
                700: '#4338ca',
                800: '#3730a3',
                900: '#312e81',
                950: '#1e1b4b',
              }
            }
          }
        }
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
      body { 
        font-family: 'Inter', sans-serif; 
        -webkit-font-smoothing: antialiased; 
        background-color: #f1f5f9;
        transition: background-color 0.3s ease;
        margin: 0;
        padding: 0;
        overflow-x: hidden;
      }
      .dark body {
        background-color: #020617;
      }
      .scrollbar-hide::-webkit-scrollbar { display: none; }
      .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
      
      button, a, input, select, textarea { 
        transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); 
        touch-action: manipulation;
      }
      
      #root {
        width: 100%;
        min-height: 100vh;
        background-color: #ffffff;
        position: relative;
        transition: background-color 0.3s ease;
      }
      
      @media (min-width: 1024px) {
        #root {
            display: flex;
            justify-content: center;
        }
      }

      .dark #root {
        background-color: #0f172a;
      }
      
      /* Smooth transitions for theme toggle */
      * {
        transition: background-color 0.3s ease, border-color 0.3s ease, color 0.2s ease;
      }

      /* Safe area support for notched phones */
      .pb-safe {
        padding-bottom: env(safe-area-inset-bottom);
      }
      .pt-safe {
        padding-top: env(safe-area-inset-top);
      }

      /* Leaflet Custom Styles */
      .leaflet-container {
        font-family: 'Inter', sans-serif;
        border-radius: 1.5rem;
        z-index: 10;
      }
      .dark .leaflet-tile {
        filter: brightness(0.6) invert(1) contrast(3) hue-rotate(200deg) saturate(0.3);
      }
    </style>
  <script type="importmap">
{
  "imports": {

    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.30.0",
    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.555.0",
    "recharts": "https://aistudiocdn.com/recharts@^3.5.0",
    "canvas-confetti": "https://cdn.skypack.dev/canvas-confetti",
    "leaflet": "https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
